{{ define "main" }}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <h1>{{ .Title }}</h1>

    <div id="report-loading" style="text-align: center; padding: 2rem;">
      Loading adoption data...
    </div>

    <div id="report-content" style="display: none;">
      <div style="margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
        <strong>Total Orders: <span id="total-orders">0</span></strong>
        <strong>Total Plants: <span id="total-plants">0</span></strong>
        <button id="copy-btn" style="margin-left: auto; padding: 0.5rem 1rem; cursor: pointer;">Copy to Clipboard</button>
      </div>

      <table id="report-table" style="width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="background: #f5f5f5; text-align: left;">
            <th style="padding: 0.75rem; border-bottom: 2px solid #dee2e6;">Name</th>
            <th style="padding: 0.75rem; border-bottom: 2px solid #dee2e6;">Type</th>
            <th style="padding: 0.75rem; border-bottom: 2px solid #dee2e6;">Plant</th>
            <th style="padding: 0.75rem; border-bottom: 2px solid #dee2e6; text-align: center;">Quantity</th>
          </tr>
        </thead>
        <tbody id="report-body">
        </tbody>
      </table>
    </div>

    <div id="report-error" style="display: none; color: #dc3545; padding: 1rem; background: #f8d7da; border-radius: 8px;">
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  "https://pcfigrjubeiztwprkcso.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjZmlncmp1YmVpenR3cHJrY3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE5NzY0NjUsImV4cCI6MjA1NzU1MjQ2NX0.gJKbfjKUB8FdNG5S8YBqKZKjE5WR1FQcK5_VS0MC-Nw"
);

async function loadReport() {
  try {
    // Fetch adopters
    const { data: adopters, error: adoptersError } = await supabase
      .from('Adopters')
      .select('email, name');

    if (adoptersError) throw adoptersError;

    // Fetch adopted plants
    const { data: adoptions, error: adoptionsError } = await supabase
      .from('AdoptedPlants')
      .select('plant_type, inventory_requested, requester')
      .order('requester');

    if (adoptionsError) throw adoptionsError;

    // Fetch plant categories
    const { data: plants, error: plantsError } = await supabase
      .from('OrphanedPlants')
      .select('plant_type, plant_catagory');

    if (plantsError) throw plantsError;

    // Create email to name lookup
    const nameByEmail = {};
    for (const adopter of adopters) {
      nameByEmail[adopter.email] = adopter.name || adopter.email;
    }

    // Create plant to category lookup
    const categoryByPlant = {};
    for (const plant of plants) {
      categoryByPlant[plant.plant_type] = plant.plant_catagory || 'Other';
    }

    // Category sort order
    const categoryOrder = ['cottage annual', 'native perennial', 'herb', 'lettuce', 'vegetable'];
    function getCategoryIndex(category) {
      const idx = categoryOrder.indexOf(category.toLowerCase());
      return idx >= 0 ? idx : 999;
    }

    // Build report data
    const reportData = adoptions.map(a => ({
      name: nameByEmail[a.requester] || a.requester,
      category: categoryByPlant[a.plant_type] || 'Other',
      plant: a.plant_type,
      quantity: a.inventory_requested
    }));

    // Sort by name, then category order, then plant
    reportData.sort((a, b) => {
      const nameCompare = a.name.localeCompare(b.name);
      if (nameCompare !== 0) return nameCompare;
      const catCompare = getCategoryIndex(a.category) - getCategoryIndex(b.category);
      if (catCompare !== 0) return catCompare;
      return a.plant.localeCompare(b.plant);
    });

    // Render table
    const tbody = document.getElementById('report-body');
    let totalPlants = 0;
    let currentName = '';

    for (const row of reportData) {
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid #dee2e6';

      // Show name only on first row for each person
      const showName = row.name !== currentName;
      if (showName) {
        currentName = row.name;
        tr.style.borderTop = '2px solid #adb5bd';
      }

      tr.innerHTML = `
        <td style="padding: 0.5rem 0.75rem; font-weight: ${showName ? '600' : 'normal'};">${showName ? row.name : ''}</td>
        <td style="padding: 0.5rem 0.75rem; text-transform: capitalize;">${row.category}</td>
        <td style="padding: 0.5rem 0.75rem;">${row.plant}</td>
        <td style="padding: 0.5rem 0.75rem; text-align: center;">${row.quantity}</td>
      `;
      tbody.appendChild(tr);
      totalPlants += row.quantity;
    }

    document.getElementById('total-orders').textContent = reportData.length;
    document.getElementById('total-plants').textContent = totalPlants;
    document.getElementById('report-loading').style.display = 'none';
    document.getElementById('report-content').style.display = 'block';

    // Copy to clipboard functionality
    document.getElementById('copy-btn').addEventListener('click', () => {
      let text = 'Name\tType\tPlant\tQuantity\n';
      for (const row of reportData) {
        text += `${row.name}\t${row.category}\t${row.plant}\t${row.quantity}\n`;
      }
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
      });
    });

  } catch (error) {
    console.error('Error loading report:', error);
    document.getElementById('report-loading').style.display = 'none';
    document.getElementById('report-error').style.display = 'block';
    document.getElementById('report-error').textContent = 'Error loading data: ' + error.message;
  }
}

loadReport();
</script>
{{ end }}
